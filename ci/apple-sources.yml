# TuxSTEP source registry
#
# Components TuxSTEP integrates from upstream beyond the Devuan substrate and
# the gershwin-developer source tree. Three categories:
#
#   1. Darling-derived runtime layer — Mach-O kernel binfmt, dyld-port,
#      libSystem-port, darlingserver Mach IPC daemon, libpthread, libplatform,
#      libdispatch, security-shim. The runtime that lets Mach-O binaries
#      execute on a Linux kernel. This is a prerequisite for everything
#      Mach-O below it.
#
#   2. Apple OSS userland (cctools, network_cmds, file_cmds) — pulled from
#      github.com/apple-oss-distributions, patched in ci/patches/<name>/,
#      built against libsystem-port (so they need the runtime layer above
#      to exist before they can build OR run).
#
#   3. launchd as PID 1 + launchd-managed daemons (launchd, mDNSResponder)
#      — also Mach-O against libsystem-port; depend on the runtime layer
#      and supervise the rest of the system.
#
# All four Darling runtime components (dyld, newlkm, darlingserver, Libsystem)
# are forked into the tuxstep org as github.com/tuxstep/darling-* — preserving
# provenance via the original Darling repo names. Apple OSS userland sources
# stay under apple-oss-distributions, with TuxSTEP-specific patches in
# ci/patches/<name>/.
#
# Each entry has a `relationship:` field:
#   consume                — pull upstream as-is at the pinned tag
#   consume_with_patches   — pull upstream + apply ci/patches/<name>/*.patch
#   forked                 — pull from a tuxstep/ org fork
#
# GNUstep / Gershwin (libobjc2, libs-base, libs-gui, libs-back, libs-corebase,
# all gershwin-components apps and daemons) are integrated via gershwin-developer
# at build time and not enumerated here — see build.sh.
#
# Tags pinned conservatively; refresh every ~6 months.

# =========================================================================
# Architecture: dual-track ELF and Mach-O coexist
# =========================================================================
#
# Two parallel tracks share the filesystem and kernel resources, but NOT
# in-process libraries.
#
#   ELF / glibc track:
#     Devuan substrate (bash, sshd, apt, dpkg, kernel modules)
#     xlibre, GNUstep (libs-base, libs-gui, libs-back, libs-corebase, libobjc2)
#     Gershwin desktop apps (Workspace.app, LoginWindow, SystemPreferences,
#       dshelper, gpbs, defaults, plutil, etc.)
#     ELF binaries link /lib/x86_64-linux-gnu/libc.so.6
#
#   Mach-O / libsystem-port track:
#     Darling runtime userspace (dyld, libsystem-port, libpthread, libplatform,
#       libdispatch, security-shim)
#     Apple OSS userland (cctools, network_cmds, file_cmds, mDNSResponder, launchd)
#     User-installed: brew bottles, MacPorts ports, third-party .app bundles
#     Mach-O binaries link /usr/lib/libSystem.B.dylib
#
#   Kernel-side / pre-userspace:
#     mach-o-binfmt — Linux kernel module (or binfmt_misc registration) that
#       routes Mach-O exec to /usr/lib/dyld
#     darlingserver — ELF Linux daemon, started by initramfs BEFORE PID 1.
#       The bridge between Mach-O processes and the Linux kernel; cannot be
#       Mach-O itself (chicken-and-egg). Built as standard Linux C++17 ELF
#       binary against glibc + libstdc++.
#
# The kernel routes binaries to their loader by binary format (ELF kernel
# loader for ELF; mach-o-binfmt module → /usr/lib/dyld for Mach-O). The
# tracks coexist transparently — no shell switch, no namespace tricks.
#
# CROSS-TRACK RULE. A single process loads libraries from one track only.
# Mach-O processes don't dlopen() ELF .so files; ELF processes don't
# dlopen() Mach-O dylibs. Cross-track communication works fine ACROSS
# processes (pipes, sockets, signals, files — libc-agnostic at the kernel
# boundary).
#
# Consequence: GNUstep's ELF Foundation (libs-base) is unreachable from a
# Mach-O brew bottle that links Apple's Foundation in-process. Accepted v1
# scope cut — most CLI bottles don't link Foundation; pure C/C++ bottles
# work. Future work could build GNUstep a second time as Mach-O against
# libsystem-port to cover this case; out of scope for v1.

# =========================================================================
# Install location convention
# =========================================================================
#
# /System/Library/Frameworks/    GNUstep-built ELF Cocoa-API frameworks
#                                (Foundation via libs-base, AppKit via libs-gui,
#                                CoreFoundation via libs-corebase) plus Apple-
#                                OSS-derived (Security via OpenSSL-stubbed shim,
#                                Mach-O).
# /System/Library/Tools/         TuxSTEP-layer Mach-O daemons and tools (launchd,
#                                launchctl, mDNSResponder, dns-sd, darlingserver).
# /System/Applications/          Native ELF Gershwin app bundles (.app
#                                directories containing ELF executables built
#                                against GNUstep).
# /Applications/                 User-installed .app bundles (typically Mach-O
#                                if from brew/MacPorts/third-party).
# /usr/bin, /usr/sbin/           Apple-flavored BSD/Unix Mach-O CLI tools (otool,
#                                ifconfig, xattr, etc.) — link libsystem-port.
# /usr/lib/libSystem.B.dylib     libc-equivalent every Mach-O TuxSTEP-native
#                                binary links against (libsystem-port).
# /usr/lib/system/               libsystem_kernel, libsystem_c, libsystem_pthread,
#                                libdispatch, libplatform — constituent dylibs.
# /usr/lib/dyld                  Mach-O dynamic linker (Darling dyld-port).
# /lib/x86_64-linux-gnu/         Devuan glibc + ld-linux. Used by ELF binaries
#                                via their hardcoded RPATH. Not on PATH; not
#                                visible to Mach-O code.

sources:

  # =========================================================================
  # PHASE 1 — Darling runtime layer (Mach-O on a Linux kernel)
  # =========================================================================
  # Prerequisite for everything else Mach-O below. Without these, no Mach-O
  # binary on the system runs at all — including launchd-as-PID-1, the Apple
  # OSS userland, and any brew/MacPorts bottle. Has to be in place before
  # Phase 2 binaries can even build (they link against libsystem-port).
  #
  # Bootstrap order at boot:
  #   1. Linux kernel + initramfs starts
  #   2. mach-o-binfmt registers Mach-O as an executable format (kernel
  #      module OR binfmt_misc + userspace mldr)
  #   3. initramfs starts darlingserver (ELF/glibc Linux daemon) — has to
  #      be running BEFORE the first Mach-O process exists
  #   4. initramfs pivots to real root, exec()s /sbin/init
  #   5. /sbin/init -> /System/Library/Tools/launchd (Mach-O); kernel routes
  #      through mach-o-binfmt -> /usr/lib/dyld -> libsystem-port
  #   6. libsystem-port connects to already-running darlingserver; Mach IPC
  #      works from instant zero
  #   7. launchd starts as PID 1, reads plists, starts the rest of the system
  #
  # No chicken-and-egg: darlingserver is in initramfs, not a launchd-managed
  # plist.
  #
  # Note: darlingserver is ELF/glibc, not Mach-O — it's the bridge daemon
  # and has to be Linux-native to do its job. Everything else in this phase
  # is Mach-O against libsystem-port.

  mach-o-binfmt:
    repo: https://github.com/tuxstep/darling-newlkm.git
    forked_from: https://github.com/darlinghq/darling-newlkm.git
    tag: 353e943673a3        # standalone-repo HEAD as of 2022-07-06
    relationship: forked
    install_to: kernel module loaded at boot
    notes: >
      Linux kernel module registering Mach-O as an executable format. When
      the kernel exec()'s a Mach-O binary, this module dispatches it through
      /usr/lib/dyld instead of the ELF loader. Loaded by initramfs before
      launchd starts.

      NB: darling-newlkm is NOT a submodule of the Darling monorepo, and
      its last upstream commit is 2022-07-06. Likely being phased out in
      favor of userspace mldr + Linux binfmt_misc. Verify during the
      integration spike whether we actually need a kernel module or whether
      binfmt_misc + a userspace Mach-O loader is sufficient. The fork
      exists either way as a starting point.

  dyld:
    repo: https://github.com/tuxstep/darling-dyld.git
    forked_from: https://github.com/darlinghq/darling-dyld.git
    tag: 63f667cf06d7ed59553adebb0c8d70a117135ac9   # matches monorepo submodule pin (2023-10-15)
    relationship: forked
    install_to: /usr/lib/dyld
    builds_against: libsystem-port
    notes: >
      Apple's dyld via Darling's port, forked into the tuxstep org. Patches
      for TuxSTEP-specific framework search paths (/System/Library/Frameworks
      first) land via PRs against our fork. The pin SHA matches the Darling
      monorepo's submodule pointer — known-good combination Darling tests
      with.

  libsystem-port:
    repo: https://github.com/tuxstep/darling-Libsystem.git
    forked_from: https://github.com/darlinghq/darling-Libsystem.git
    tag: 08df454b6eb0df9400aa4c39839a7efd6efd2c3c   # matches monorepo submodule pin (2023-10-05)
    relationship: forked
    install_to:
      libSystem:          /usr/lib/libSystem.B.dylib
      libsystem_kernel:   /usr/lib/system/libsystem_kernel.dylib
      libsystem_c:        /usr/lib/system/libsystem_c.dylib
      libsystem_info:     /usr/lib/system/libsystem_info.dylib
      libsystem_m:        /usr/lib/system/libsystem_m.dylib
      libsystem_malloc:   /usr/lib/system/libsystem_malloc.dylib
      libsystem_notify:   /usr/lib/system/libsystem_notify.dylib
      # additional libsystem_*.dylib subcomponents added as they're implemented
    notes: >
      Forked from Darling's libsystem-port for TuxSTEP-specific framework
      search paths (/System/Library/Frameworks resolved first, then
      /Local/Library/Frameworks, then prefix paths brew/MacPorts install)
      and removal of Apple-private dependencies we don't replicate.

      Source chain. Apple open-sources most libSystem constituents at
      github.com/apple-oss-distributions/{Libc, libpthread, libplatform,
      libdispatch, libmalloc, libnotify, xnu, Libsystem, xpc} under APSL 2.0.
      Apple drops the source after each macOS release; they do not develop
      in the open. Darling has done ~10 years of work pulling those drops,
      patching them to build on Linux (replacing Mach traps with darlingserver
      IPC, replacing XNU syscalls with Linux syscalls, building without
      Apple's xcrun), and filling gaps Apple does not open-source (libcorecrypto
      stubs forwarding to OpenSSL, libsystem_info pieces, build glue). We
      inherit Darling's Linux work and add TuxSTEP-specific patches on top.

      libsystem_kernel is the Mach-trap-to-Linux-syscall layer — the part
      Darling has done the heavy lifting on.

      libsystem-port does NOT forward Foundation/AppKit/Cocoa symbols to
      GNUstep. GNUstep is ELF/glibc; libsystem-port is Mach-O. Mixing them
      in a single process would cross-load incompatible libcs (heap
      corruption hazard). Mach-O apps that link Apple's Foundation just
      don't load — accepted v1 scope cut.

  darlingserver:
    repo: https://github.com/tuxstep/darlingserver.git
    forked_from: https://github.com/darlinghq/darlingserver.git
    tag: 89751e64bc6c2082f7725061824ee0e33395b0de   # matches monorepo submodule pin (2025-12-06; actively developed)
    relationship: forked
    install_to: /usr/sbin/darlingserver           # ELF, FHS — also embedded in initramfs
    builds_against: glibc                          # NOT libsystem-port — see notes
    startup: initramfs (pre-PID-1)
    notes: >
      Userspace Mach IPC daemon, forked into the tuxstep org. Translates
      Mach traps and IPC calls from Mach-O processes into Linux syscalls
      (epoll, sockets, futex, etc.).

      Built as a standard Linux C++17 ELF binary against glibc and libstdc++
      (verified by reading the upstream CMakeLists.txt: `-Wl,--gc-sections`
      is GNU-ld-specific, no Mach-O target). NOT against libsystem-port.
      This is intentional and load-bearing: darlingserver is the bridge
      between Mach-O processes and the Linux kernel — if it were Mach-O
      itself, nothing else could run (chicken-and-egg with libsystem-port).

      Started by initramfs before PID 1 — see the Phase 1 header's bootstrap
      order. Most actively developed of the four runtime forks (last
      upstream commit 2025-12).

  libpthread:
    repo: https://github.com/apple-oss-distributions/libpthread.git
    tag: libpthread-539.100.4
    relationship: consume
    install_to: /usr/lib/system/libsystem_pthread.dylib
    notes: >
      Apple's libpthread (Darling vendors a pinned version). Wired through
      libsystem-port. Mostly Linux-portable.

  libplatform:
    repo: https://github.com/apple-oss-distributions/libplatform.git
    tag: libplatform-375.100.10
    relationship: consume
    install_to: /usr/lib/system/libsystem_platform.dylib
    notes: >
      Apple's libplatform — low-level platform code (TLS, locks, atomics).
      Linux-portable.

  libdispatch:
    repo: https://github.com/apple-oss-distributions/libdispatch.git
    tag: libdispatch-1542.100.32
    relationship: consume
    install_to: /usr/lib/system/libdispatch.dylib
    notes: >
      Apple's libdispatch from apple-oss-distributions (matches the rest of
      our Apple OSS source pinning style — proper version tags rather than
      the swift-corelibs-libdispatch development snapshots). Wired through
      libsystem-port. GCD's dispatch_async, queue semantics, etc. work
      natively.

  security-shim:
    repo: https://github.com/tuxstep/security-shim.git    # not yet created
    branch: main
    relationship: forked
    install_to:
      Security: /System/Library/Frameworks/Security.framework/Versions/A/Security
    additional:
      - /System/Library/Frameworks/Security.framework/Security ->
          Versions/A/Security                            # framework version symlink
    notes: >
      Stub Security.framework forwarding SSL APIs (SSLCreateContext,
      SSLHandshake, SSLRead/Write, SecTrustCreateWithCertificates,
      SecTrustEvaluate, etc.) to OpenSSL. Keychain APIs return errors
      gracefully. Codesign/notarization APIs are no-ops (always "valid").

      Lets brew bottles using SecureTransport for TLS work without porting
      Apple's full Security.framework. Tools that genuinely need keychain
      or codesign features (xcrun, codesign(1), authd-talking utilities)
      stay broken — accepted scope cut.

  # =========================================================================
  # PHASE 2 — Apple OSS standalone CLI tools
  # =========================================================================
  # Mach-O binaries built against libsystem-port. Depend on Phase 1 to build
  # AND to run. No supervisor needed — these are CLI tools invoked from any
  # shell.

  cctools:
    repo: https://github.com/tpoechtrager/cctools-port.git
    tag: cctools-877.8-ld64-253.9-1
    relationship: consume_with_patches
    install_to: /usr/bin/
    binaries: [otool, lipo, install_name_tool]
    builds_against: libsystem-port
    notes: >
      Mach-O binary toolchain. tpoechtrager's port is well-trodden on Linux —
      the warm-up port for the build harness.

      Only Mach-O-unique binaries install: otool, lipo, install_name_tool.
      cctools-port also builds nm/strip/ar/ranlib variants; those names
      conflict with GNU binutils (which the Linux toolchain depends on for
      ELF), so we deliberately do not install them. If a developer ever
      needs Apple's flavor for Mach-O inspection, they can be added later
      under a x86_64-apple-darwin- prefix without touching the GNU defaults.

  network_cmds:
    repo: https://github.com/apple-oss-distributions/network_cmds.git
    tag: network_cmds-741.100.2
    relationship: consume_with_patches
    install_to:
      ifconfig: /usr/sbin/ifconfig
      route:    /usr/sbin/route
      arp:      /usr/sbin/arp
      ndp:      /usr/sbin/ndp
      netstat:  /usr/bin/netstat
    only: [ifconfig, route, netstat, arp, ndp]
    replaces: net-tools
    builds_against: libsystem-port
    notes: >
      FreeBSD-flavored network UX. Replaces Devuan's net-tools (which provides
      ifconfig/route/netstat/arp at the same paths) — drop net-tools from
      packages.list and ship Apple's binaries instead. iproute2's `ip` and
      `ss` stay reachable as Linux-native alternatives. ndp is BSD-only with
      no Linux conflict.

  file_cmds:
    repo: https://github.com/apple-oss-distributions/file_cmds.git
    tag: file_cmds-479
    relationship: consume_with_patches
    install_to: /usr/bin/
    only: [xattr]
    builds_against: libsystem-port
    notes: >
      Just xattr for macOS-script compat. coreutils handles cp/mv/rm/etc.,
      so we explicitly do NOT pull the rest of file_cmds. No name conflict —
      Devuan doesn't ship an xattr binary; attr's getfattr/setfattr stay
      installed alongside as the Linux-native equivalent.

  # =========================================================================
  # PHASE 3 — launchd as PID 1 and launchd-managed daemons
  # =========================================================================
  # Also Mach-O against libsystem-port. launchd is a special case — it has
  # to come up before darlingserver but expects darlingserver's Mach IPC to
  # work for Mach-bootstrap. Darling has solved this with an inline bootstrap
  # in launchd's startup; we inherit that.

  launchd:
    repo: https://github.com/apple-oss-distributions/launchd.git
    tag: launchd-842.92.1
    relationship: consume_with_patches
    install_to:
      launchd:   /System/Library/Tools/launchd
      launchctl: /System/Library/Tools/launchctl
    additional:
      - /sbin/init -> /System/Library/Tools/launchd   # symlink for kernel PID 1
    builds_against: libsystem-port
    notes: >
      Lives entirely in /System so the TuxSTEP system layer (init, frameworks,
      apps) can be rebuilt and reinstalled from source as a unit. /sbin/init
      is a symlink that satisfies the kernel's conventional PID 1 location —
      everything that actually executes lives under /System.

      Real Apple launchd. Mach-bootstrap subsystem stays enabled — it talks
      to darlingserver for the underlying IPC. Job spawning, KeepAlive,
      plist parsing, and socket activation are POSIX. The bootstrap server
      is one of darlingserver's clients, so launchd-via-Mach-bootstrap and
      launchd-via-POSIX-sockets coexist.

  mDNSResponder:
    repo: https://github.com/apple-oss-distributions/mDNSResponder.git
    tag: mDNSResponder-2881.100.56.0.1
    relationship: consume_with_patches
    install_to:
      mDNSResponder: /System/Library/Tools/mDNSResponder
      dns-sd:        /System/Library/Tools/dns-sd
    only: [mDNSResponder, dns-sd]
    replaces: avahi-daemon
    builds_against: libsystem-port
    notes: >
      Apple's Bonjour/mDNS daemon. Builds against the mDNSCore + mDNSPosix
      tree — the IOKit-coupled mDNSMacOSX layer is skipped (we don't have
      IOKit). Replaces avahi-daemon — drop avahi from packages.list.

      Lives in /System alongside launchd because it's launchd-managed:
      without launchd as PID 1 there's no supervisor to run it. Started via
      /System/Library/LaunchDaemons/com.apple.mDNSResponder.plist.

# =========================================================================
# Explicitly NOT integrated
# =========================================================================
# Things in apple-oss-distributions or Darling that are deliberately out of
# scope. Listed here so future contributors see the rationale and don't
# casually reopen the question.

not_integrated:

  Foundation:
    reason: Apple's Foundation is not open source.
    use_instead: GNUstep libs-base — available to ELF/glibc TuxSTEP-native
                 apps (Gershwin desktop, etc.). NOT available to Mach-O apps:
                 a Mach-O brew bottle that links Apple's Foundation does not
                 load. Accepted v1 scope cut. Could be revisited by building
                 GNUstep twice (once Mach-O against libsystem-port) — out of
                 scope for v1.

  CoreFoundation:
    reason: >
      Apple's CF is bound to Mach IPC and CFRunLoop semantics that don't map
      cleanly even with darlingserver-backed Mach. libs-corebase covers the
      API surface most ELF/GNUstep apps actually use.
    use_instead: libs-corebase from Gershwin — for ELF/glibc TuxSTEP-native
                 apps. Mach-O apps that link Apple's CoreFoundation do not
                 load (same cross-libc constraint as Foundation above).

  IOKit:
    reason: Mach + xnu coupling and kernel device-tree assumptions. The
            equivalent on Linux is udev + sysfs + drm. Mac binaries calling
            IOKit will fail at runtime — accepted scope cut.
    use_instead: udev / sysfs / drm

  OpenDirectory:
    reason: Architecturally tied to Apple's DirectoryService daemon; Gershwin's
            dshelper is the right substrate.
    use_instead: Gershwin dshelper

  configd:
    reason: SystemConfiguration framework is a Mach-based config service tied
            tightly to Apple's network plumbing.
    use_instead: NetworkManager / ifupdown (Devuan default)

  shell_cmds:
    reason: GNU coreutils + util-linux are sufficient and well-maintained.
    use_instead: coreutils + util-linux (Devuan default)

  text_cmds:
    reason: GNU coreutils covers head/tail/cut/etc.
    use_instead: coreutils (Devuan default)

  file_cmds_other:
    reason: Aside from xattr (above), the rest of file_cmds duplicates coreutils.
    use_instead: coreutils (Devuan default)

  system_cmds:
    reason: >
      Investigated and dropped. dshelper maintains its own plist-backed data
      store (NSDictionary keyed by username with a passwordHash field, verified
      in dshelper.m) — it does NOT consume /etc/master.passwd or
      /etc/{pwd,spwd}.db, so pwd_mkdb has no role here. Every other binary
      we might want has a working Linux equivalent (vipw / shadow-utils,
      getty / util-linux's agetty, getconf / glibc, vifs marginal), and
      Apple's sysctl is incompatible with Linux /proc/sys.
    use_instead: util-linux + shadow-utils + glibc (Devuan defaults)

  openssh:
    reason: Devuan's stock openssh works fine. Apple's fork would only add
            value for parity with macOS-specific sshd_config knobs or PAM
            integration — no concrete need today.
    use_instead: openssh-server (Devuan default)

  objc4:
    reason: Apple's Objective-C runtime. libobjc2 from Gershwin already
            provides a complete, more modern implementation for the ELF track.
            Mach-O apps that link Apple's libobjc4 do not load (same
            cross-libc constraint).
    use_instead: libobjc2 (Gershwin already uses it on the ELF track)

  xnu:
    reason: It's a kernel.
    use_instead: Linux

# =========================================================================
# Open question for review
# =========================================================================
# Anything missing from this list that we'll regret not pinning early?
#
# (Other engineering decisions — dyld fork-vs-patches threshold, security-shim
# API surface, the launchd ↔ darlingserver bootstrap order — are deferred to
# the integration spike. Not registry-blocking.)
