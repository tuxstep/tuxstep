# Apple open-source components that TuxSTEP integrates from
# github.com/apple-oss-distributions and friends.
#
# This file is a *registry only* — no build harness yet. Future PRs will add:
#   ci/build/fetch-apple-sources.sh   — clone each entry at the pinned tag
#   ci/build/apply-patches.sh         — apply ci/patches/<name>/*.patch in order
#   ci/build/build-all.sh             — dispatch to ci/build/sources/<name>.sh
#
# Tags are pinned conservatively. Refresh every ~6 months.
# Where a tag is `TBD` we still need to pick one — see comments.
#
# Install location convention:
#   /System/Library/...   — TuxSTEP-specific layer (GNUstep, Gershwin, launchd,
#                           plists, frameworks). Self-contained and rebuildable;
#                           can be wiped and reinstalled from source as a unit.
#   /usr/bin, /usr/sbin   — Apple-flavored BSD/Unix tools that replace or
#                           supplement Devuan's equivalents (ifconfig, otool,
#                           xattr). Live outside /System so the system stays
#                           bootable when /System is being rebuilt.

sources:

  # =========================================================================
  # PHASE 1 — Apple OSS userland (no init replacement yet)
  # =========================================================================

  cctools:
    repo: https://github.com/tpoechtrager/cctools-port.git
    tag: '973.0.1'
    install_to: /usr/bin/
    binaries: [otool, lipo, install_name_tool]
    notes: >
      Mach-O binary toolchain. tpoechtrager's port already builds cleanly on
      Linux — picked as the warm-up port for the build harness because it's
      the lowest-risk way to validate fetch/patch/build/install end-to-end.

      Only the Mach-O-unique binaries install: otool, lipo, install_name_tool.
      cctools-port also builds nm/strip/ar/ranlib variants, but those names
      conflict with GNU binutils, which the Linux toolchain depends on for
      ELF. We deliberately do not install them. If a developer ever needs
      Apple's flavor for Mach-O inspection, they can be added later under
      a x86_64-apple-darwin- prefix without touching the GNU defaults.

  network_cmds:
    repo: https://github.com/apple-oss-distributions/network_cmds.git
    tag: network_cmds-621
    install_to:
      ifconfig: /usr/sbin/ifconfig
      route:    /usr/sbin/route
      arp:      /usr/sbin/arp
      ndp:      /usr/sbin/ndp
      netstat:  /usr/bin/netstat
    only: [ifconfig, route, netstat, arp, ndp]
    replaces: net-tools
    notes: >
      FreeBSD-flavored network UX. Replaces Devuan's net-tools (which provides
      ifconfig/route/netstat/arp at the same paths) — we drop net-tools from
      packages.list and ship Apple's binaries instead. iproute2's `ip` and
      `ss` stay reachable as Linux-native alternatives. ndp is BSD-only with
      no Linux conflict.

  file_cmds:
    repo: https://github.com/apple-oss-distributions/file_cmds.git
    tag: TBD                           # latest stable file_cmds-* tag
    install_to: /usr/bin/
    only: [xattr]
    notes: >
      Just xattr for macOS-script compat. coreutils handles cp/mv/rm/etc.,
      so we explicitly do NOT pull the rest of file_cmds. No name conflict —
      Devuan doesn't ship an xattr binary; attr's getfattr/setfattr stay
      installed alongside as the Linux-native equivalent.

  # =========================================================================
  # PHASE 2 — Init replacement (the project's actual differentiator)
  # =========================================================================

  launchd:
    repo: https://github.com/apple-oss-distributions/launchd.git
    tag: launchd-842.92.1
    install_to:
      launchd:   /System/Library/Tools/launchd
      launchctl: /System/Library/Tools/launchctl
    additional:
      - /sbin/init -> /System/Library/Tools/launchd   # symlink for kernel PID 1
    notes: >
      Lives entirely in /System so the TuxSTEP system layer (init, frameworks,
      apps) can be rebuilt and reinstalled from source as a unit. /sbin/init
      is a symlink that satisfies the kernel's conventional PID 1 location —
      everything that actually executes lives under /System.

      Real Apple launchd. Mach-bootstrap subsystem is dead code on Linux —
      a TuxSTEP patch disables it. Job spawning, KeepAlive, plist parsing,
      and socket activation are all straight POSIX.

# =========================================================================
# Explicitly NOT integrated
# =========================================================================
# These show up in apple-oss-distributions but are deliberately out of scope.
# Listed here so future contributors see the rationale and don't reopen the
# question casually.

not_integrated:

  Foundation:
    reason: Apple's Foundation is not open source.
    use_instead: GNUstep libs-base (Gershwin already builds it)

  CoreFoundation:
    reason: >
      Apple's CF is bound to Mach IPC and CFRunLoop semantics that don't map
      to Linux. The open swift-corelibs-foundation is OK but we can use
      libs-corebase from Gershwin for the same surface area.
    use_instead: libs-corebase (Gershwin)

  Libsystem:
    reason: Wraps Mach traps. Glibc covers the same job on Linux.
    use_instead: glibc

  libdispatch:
    reason: >
      A clean Linux fork already exists and is well-maintained.
    use_instead: libdispatch.dev (https://github.com/apple/swift-corelibs-libdispatch)

  OpenDirectory:
    reason: >
      Architecturally tied to Apple's DirectoryService daemon. Gershwin's
      dshelper is the right substrate on Linux.
    use_instead: Gershwin dshelper

  IOKit:
    reason: Mach + xnu coupling; no Linux equivalent. Userspace probes /sys.
    use_instead: udev / sysfs

  configd:
    reason: SystemConfiguration framework is a Mach-based config service.
    use_instead: NetworkManager / ifupdown (Devuan default)

  mDNSResponder:
    reason: Apple's daemon is Mach-coupled and bigger than necessary.
    use_instead: avahi-daemon

  shell_cmds:
    reason: GNU coreutils + util-linux are sufficient and well-maintained.
    use_instead: coreutils + util-linux (Devuan default)

  text_cmds:
    reason: GNU coreutils covers head/tail/cut/etc.
    use_instead: coreutils (Devuan default)

  file_cmds_other:
    reason: >
      Aside from xattr (above), the rest of file_cmds duplicates coreutils.
    use_instead: coreutils (Devuan default)

  system_cmds:
    reason: >
      Investigated and dropped. dshelper maintains its own plist-backed
      data store (NSDictionary keyed by username with a passwordHash field,
      verified in dshelper.m) — it does NOT consume /etc/master.passwd or
      /etc/{pwd,spwd}.db, so pwd_mkdb has no role here. Every other binary
      we might want has a working Linux equivalent: vipw via shadow-utils,
      getty via util-linux's agetty, getconf via glibc, vifs is marginal,
      and Apple's sysctl is incompatible with Linux /proc/sys.
    use_instead: util-linux + shadow-utils + glibc (Devuan defaults)

  Security:
    reason: >
      Tightly coupled to Mach + Apple's Keychain Services. The pieces we'd
      want (CommonCrypto-equivalents) are already in OpenSSL/libsodium.
    use_instead: OpenSSL / libsodium

  objc4:
    reason: >
      Apple's Objective-C runtime. Only relevant if we ever want unmodified
      Mac binary compatibility — that's the corner-2 port from the design
      doc, not the TuxSTEP v1 mission.
    use_instead: GNUstep libobjc2 (Gershwin already uses it)

  xnu:
    reason: It's a kernel.
    use_instead: Linux

  openssh:
    reason: >
      Devuan's stock openssh works fine. Apple's fork would only add value
      if we wanted parity with macOS-specific sshd_config knobs or Apple's
      PAM integration — no concrete reason for that today.
    use_instead: openssh-server (Devuan default)

