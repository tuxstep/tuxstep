insmod all_video
insmod gfxterm
insmod iso9660
insmod part_gpt
insmod part_msdos
insmod fat
insmod search

set default=0
set timeout=5
set timeout_style=menu

# Find the partition containing our live system
search --no-floppy --set=root --file /live/vmlinuz

menuentry "TuxSTEP" {
    linux /live/vmlinuz boot=live
    initrd /live/initrd.img
}

menuentry "TuxSTEP (verbose)" {
    linux /live/vmlinuz boot=live loglevel=7
    initrd /live/initrd.img
}

menuentry "TuxSTEP (fail-safe)" {
    linux /live/vmlinuz boot=live memtest noapic noapm nodma nomce nolapic nomodeset nosmp nosplash vga=normal
    initrd /live/initrd.img
}
