name: Build TuxSTEP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # Stage 1: build + push the per-arch build-environment containers to ghcr.
  # Push to main → tag `:latest`. PR → tag `:pr-<num>` so PRs don't overwrite
  # main's working image (a broken Dockerfile in a PR would otherwise break
  # main's CI). buildx GHA cache shares layers across both, so PR builds are
  # still fast.
  build-containers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    name: Container (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --allow-insecure-entitlement security.insecure

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ci/containers/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          allow: security.insecure
          tags: ghcr.io/${{ github.repository_owner }}/tuxstep-build-${{ matrix.arch }}:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'latest' }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  # Stage 2: build the ISOs inside the freshly-published containers.
  # `needs: build-containers` enforces strict ordering — no race.
  build-iso:
    needs: build-containers
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/${{ github.repository_owner }}/tuxstep-build-${{ matrix.arch }}:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'latest' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # No --privileged or /proc bind needed: rootfs prep happened at
      # container-build time. ISO assembly (mksquashfs / GRUB / xorriso)
      # runs unprivileged.
    name: ISO (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v4

      - name: Build ISO
        run: |
          chmod +x build.sh
          ./build.sh

      # Upload each arch's ISO as a workflow artifact. The publish job
      # collects both and pushes to the `continuous` release as a single
      # sequential step — avoids the parallel-uploader race where two
      # arches both try to delete-and-recreate the release at once.
      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuxstep-iso-${{ matrix.arch }}
          path: '*.iso'
          if-no-files-found: error
          retention-days: 7

  # Stage 3: collect both arch ISOs and publish to the `continuous` release
  # tag. Single job (not matrix) so there's only one uploader at a time.
  # Skipped on PRs.
  publish:
    needs: build-iso
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Show downloaded artifacts
        run: ls -lh artifacts/

      - name: Delete previous `continuous` release if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete continuous \
              --yes --cleanup-tag \
              --repo ${{ github.repository }} \
              || echo "No previous continuous release to delete."

      - name: Publish `continuous` release with both ISOs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous build
          body: |
            Built from `${{ github.sha }}`.

            GitHub Actions build log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: artifacts/*.iso
          prerelease: false
          make_latest: 'false'
